<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuständigkeits-Lostopf</title>
    <style>
        /* Bosch-Farbpalette (Referenzfarben) */
        :root {
            --bosch-red: #ea0016;
            --bosch-blue: #007bc0;
            --bosch-gray-dark: #333333;
            --bosch-gray-medium: #666666;
            --bosch-gray-light: #f0f0f0;
            --bosch-white: #ffffff;
            --bosch-black: #000000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            color: var(--bosch-gray-dark);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            
            /* Hintergrundbild: Dein 'backdrop.jpg' */
            background-image: url('bilder/location-duesseldorf.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            overflow: hidden;
        }

        /* --- NEU: Hintergrund-Overlay für den Body zur besseren Lesbarkeit --- */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Halbtransparentes Schwarz */
            z-index: 0; /* Unter dem Hauptinhalt */
        }

        h1 {
            color: var(--bosch-white); /* Weißer Text für Kontrast zum dunkleren Overlay */
            margin-bottom: 30px;
            z-index: 1; /* Über dem Overlay */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); /* Stärkerer Textschatten */
        }

        #lostopfContainer {
            background-color: rgba(255, 255, 255, 0.98); /* Fast vollständig deckend für Hauptinhalt */
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4); /* Kräftigerer Schatten */
            padding: 40px;
            max-width: 800px;
            min-height: 450px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            transition: all 0.3s ease-in-out;
            z-index: 1; /* Über dem Overlay */
        }

        /* ----- Fragen-Anzeige (Einzelanzeige) ----- */
        #frageAnzeige {
            font-size: 2.2em;
            font-weight: 600;
            color: var(--bosch-gray-dark);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease-out, transform 0.3s ease-out;
            position: relative;
            overflow: hidden;
            width: 100%;
            padding: 0 15px;
            box-sizing: border-box;
        }

        #frageAnzeige.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* ----- Personenbild-Roller (Kugelform) ----- */
        #personBildRoller {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            border: 5px solid var(--bosch-red); /* Bosch-Rot für den Rahmen */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            position: relative;
            display: none;
        }

        #personBildRoller.active {
            display: block;
        }

        .image-roller {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            transition: transform 0.1s linear;
        }
        .image-roller img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .image-roller > div {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ----- Finale Anzeige der Person (Bild und Name) ----- */
        #finalPersonDisplay {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s ease-out, transform 0.5s ease-out;
        }
        #finalPersonDisplay.active {
            opacity: 1;
            transform: translateY(0);
        }
        #finalPersonDisplay img {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--bosch-red); /* Bosch-Rot für den Rahmen */
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }
        #finalPersonDisplay p {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--bosch-blue); /* Bosch-Blau für den Namen */
            margin: 0;
        }

        /* ----- Button ----- */
        #ziehenButton {
            padding: 16px 35px;
            font-size: 1.4em;
            cursor: pointer;
            background-color: var(--bosch-red); /* Bosch-Rot für den Button */
            color: var(--bosch-white); /* Weißer Text auf rotem Button */
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px rgba(0, 0, 0, 0.3); /* Etwas dunklerer Schatten für 3D-Effekt */
            outline: none;
            transition: all 0.2s ease-in-out;
            margin-top: 20px;
        }
        #ziehenButton:hover { background-color: #d10014; box-shadow: 0 2px rgba(0, 0, 0, 0.4); transform: translateY(2px); } /* Dunkleres Rot beim Hover */
        #ziehenButton:active { background-color: #b00011; box-shadow: none; transform: translateY(4px); } /* Noch dunkler beim Klicken */

        /* ----- Logos und Linien in den Ecken ----- */
        .corner-element {
            position: absolute;
            height: auto;
            z-index: 10; /* Über allen anderen Inhalten und dem Overlay */
            opacity: 0.9;
        }
        /* Bosch-Logo oben links */
        .logo-top-left { 
            top: 20px; 
            left: 20px; 
            width: 300px; /* Wie gewünscht 300px */
        }
        /* Dekorative Line.png unten rechts */
        .line-bottom-right { 
            bottom: 20px; 
            right: 20px; 
            width: 350px;
            transform: rotate(-90deg); /* 90 Grad drehen */
            transform-origin: bottom right; /* Drehpunkt unten rechts */
            opacity: 0.7;
        }

        /* ----- NEU: Durchgehende Linie am unteren Rand ----- */
        #fullWidthLine {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 15px; /* Dicke der Linie */
            background-color: var(--bosch-blue); /* Bosch-Blau für die Linie */
            z-index: 5; /* Über dem Hintergrund und Overlay, aber unter den Eckelementen */
            box-shadow: 0 -3px 8px rgba(0, 0, 0, 0.2);
        }

        /* Media Queries für Responsivität */
        @media (max-width: 900px) {
            #lostopfContainer { max-width: 600px; min-height: 400px; }
            #frageAnzeige { font-size: 1.8em; min-height: 70px; }
            #personBildRoller, #finalPersonDisplay img { width: 200px; height: 200px; }
            #finalPersonDisplay p { font-size: 1.5em; }
            #ziehenButton { font-size: 1.2em; padding: 14px 30px; }
            .logo-top-left { width: 200px; top: 15px; left: 15px; }
            .line-bottom-right { width: 250px; bottom: 15px; right: 15px; }
            #fullWidthLine { height: 10px; }
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5em; margin-bottom: 20px; }
            #lostopfContainer { padding: 25px; max-width: 95%; min-height: 350px; }
            #frageAnzeige { font-size: 1.4em; min-height: 60px; }
            #personBildRoller, #finalPersonDisplay img { width: 150px; height: 150px; }
            #finalPersonDisplay p { font-size: 1.2em; }
            #ziehenButton { font-size: 1em; padding: 10px 20px; }
            .logo-top-left, .line-bottom-right { display: none; } /* Eckelemente auf sehr kleinen Bildschirmen ausblenden */
            #fullWidthLine { height: 7px; }
        }
    </style>
</head>
<body>

    <!-- Eckelemente: Logos und Linien -->
    <img src="bilder/logo-white.png" alt="Bosch Logo" class="corner-element logo-top-left">
    <img src="bilder/line.png" alt="Dekorative Linie" class="corner-element line-bottom-right">

    <!-- Durchgehende Linie am unteren Rand -->
    <div id="fullWidthLine"></div>

    <h1>Wer ist zuständig?</h1>
    <div id="lostopfContainer">
        <!-- Fragen-Anzeige: Zeigt die Fragen einzeln oder die finale Frage -->
        <div id="frageAnzeige"></div>

        <!-- Personenbild-Roller: Zeigt die fliegenden Bilder -->
        <div id="personBildRoller">
            <div class="image-roller"></div>
        </div>

        <!-- Finale Anzeige der Person: Bild und Name nach dem Roller -->
        <div id="finalPersonDisplay">
            <img id="finalPersonImage" src="" alt="Zuständige Person">
            <p id="finalPersonName"></p>
        </div>
        
        <button id="ziehenButton">Frage ziehen</button>
    </div>

    <script>
        const fragenDaten = [
           { frage: "Wer ist für das Social Media Marketing zuständig?", bild: "bilder/Koala.jpg", name: "Koala Bär" },
            { frage: "Wer ist der Hauptansprechpartner für IT-Support?", bild: "bilder/Schwarz_Sebastian.jpg", name: "Sebastian Schwarz" },
            { frage: "Wer verantwortet die Projektplanung für das neue Produkt?", bild: "bilder/Penguins.jpg", name: "Pinguin Team" },
            { frage: "Wer organisiert unser nächstes Teamevent?", bild: "bilder/Skispringen.JPG", name: "Ski Team" },
            { frage: "Wer kümmert sich um die Budgetplanung Q3?", bild: "bilder/Koala.jpg", name: "Koala Bär" },
            { frage: "Wer ist unser Experte für Kundenfeedback?", bild: "bilder/Schwarz_Sebastian.jpg", name: "Sebastian Schwarz" }
            // Füge hier weitere Fragen, Bildpfade und Namen hinzu
            // Wichtig: Achte auf die korrekten Dateinamen (Groß-/Kleinschreibung) und Dateitypen (.jpg, .png)!
        ];

        // --- Referenzen zu den HTML-Elementen ---
        const frageAnzeige = document.getElementById('frageAnzeige');
        const personBildRoller = document.getElementById('personBildRoller');
        const imageRoller = personBildRoller.querySelector('.image-roller');
        const finalPersonDisplay = document.getElementById('finalPersonDisplay');
        const finalPersonImage = document.getElementById('finalPersonImage');
        const finalPersonName = document.getElementById('finalPersonName');
        const ziehenButton = document.getElementById('ziehenButton');

        // --- Globale Variablen für den Zustand und Timer ---
        let aktuelleFrageIndex = -1;
        let bereitsGezogeneIndices = [];
        let frageAnzeigeTimeout; // Timer für den Fragen-Wechsler
        let imageRollInterval; // Interval für den Personenbild-Roller

        // --- Initialisierung beim Laden der Seite ---
        setzeZurueck();

        // --- Event-Listener für den Hauptbutton ---
        ziehenButton.addEventListener('click', () => {
            if (ziehenButton.textContent === "Frage ziehen") {
                starteFragenZiehProzess();
            } else if (ziehenButton.textContent === "Person zeigen") {
                startePersonZiehProzess();
            } else if (ziehenButton.textContent === "Nächste Frage") {
                setzeZurueck();
            }
        });

        // --- Funktion: Startet den Prozess zum Anzeigen der Fragen ---
        function starteFragenZiehProzess() {
            // Alle anderen Anzeigen ausblenden
            finalPersonDisplay.classList.remove('active');
            personBildRoller.classList.remove('active');
            
            // Fragen-Anzeige aktivieren (sichtbar machen)
            frageAnzeige.classList.add('active'); 
            ziehenButton.disabled = true; // Button deaktivieren

            const numRolls = 7; // Wie viele Zwischenfragen gezeigt werden sollen
            let currentRoll = 0;
            
            // Zufällige Reihenfolge der Fragen für den "Roller-Effekt"
            const shuffledQuestions = [...fragenDaten].sort(() => 0.5 - Math.random());

            function zeigeNacheinander() {
                if (currentRoll < numRolls) {
                    // Frage ausblenden (für den Überblendeffekt)
                    frageAnzeige.style.opacity = '0';
                    frageAnzeige.style.transform = 'translateY(10px)';
                    
                    setTimeout(() => {
                        // Nächste Frage setzen und einblenden
                        frageAnzeige.textContent = shuffledQuestions[currentRoll % shuffledQuestions.length].frage;
                        frageAnzeige.style.opacity = '1';
                        frageAnzeige.style.transform = 'translateY(0)';
                        currentRoll++;
                        frageAnzeigeTimeout = setTimeout(zeigeNacheinander, 350); // Nächste Frage nach 350ms
                    }, 100); // Kurze Pause, um das Ausblenden zu sehen
                } else {
                    // --- Finale Frage auswählen und anzeigen ---
                    let randomIndex;
                    if (bereitsGezogeneIndices.length === fragenDaten.length) {
                        bereitsGezogeneIndices = []; // Zurücksetzen, wenn alle Fragen dran waren
                    }
                    do {
                        randomIndex = Math.floor(Math.random() * fragenDaten.length);
                    } while (bereitsGezogeneIndices.includes(randomIndex));
                    aktuelleFrageIndex = randomIndex;
                    bereitsGezogeneIndices.push(randomIndex);

                    // Finale Frage ausblenden (für den Überblendeffekt)
                    frageAnzeige.style.opacity = '0';
                    frageAnzeige.style.transform = 'translateY(10px)';

                    setTimeout(() => {
                        // Finale Frage setzen und einblenden
                        frageAnzeige.textContent = fragenDaten[aktuelleFrageIndex].frage;
                        frageAnzeige.style.opacity = '1';
                        frageAnzeige.style.transform = 'translateY(0)';
                        ziehenButton.disabled = false; // Button wieder aktivieren
                        ziehenButton.textContent = "Person zeigen"; // Text ändern
                    }, 200); // Etwas längere Pause für den finalen Fade-in
                }
            }
            zeigeNacheinander(); // Startet den Fragen-Wechsler
        }

        // --- Funktion: Startet den Prozess zum Anzeigen der Person (Bilder-Roller) ---
        function startePersonZiehProzess() {
            // Fragen-Anzeige ausblenden und leeren
            frageAnzeige.classList.remove('active');
            frageAnzeige.textContent = ''; 
            
            // Finale Personen-Anzeige ausblenden
            finalPersonDisplay.classList.remove('active');

            ziehenButton.disabled = true; // Button deaktivieren
            personBildRoller.classList.add('active'); // Personenbild-Roller sichtbar machen
            imageRoller.innerHTML = ''; // Inhalt des Rollers leeren

            // Roller mit allen Personenbildern füllen (mehrfach für den Effekt)
            const tempPersonen = [...fragenDaten].sort(() => 0.5 - Math.random());
            const imageSize = 250; // Höhe/Breite eines Bildes im Roller (muss zu CSS passen!)
            const numDummyImages = fragenDaten.length * 5; // Genug Bilder für den Effekt

            for (let i = 0; i < numDummyImages; i++) {
                const div = document.createElement('div'); // Wrapper für jedes Bild
                const img = document.createElement('img');
                img.src = tempPersonen[i % tempPersonen.length].bild;
                img.alt = tempPersonen[i % tempPersonen.length].name;
                div.appendChild(img);
                imageRoller.appendChild(div);
            }

            // Finale Person (mehrfach) ans Ende des Rollers anhängen, damit sie mittig stoppt
            const numFinalCopies = 3; 
            for(let i = 0; i < numFinalCopies; i++) {
                const div = document.createElement('div');
                const img = document.createElement('img');
                img.src = fragenDaten[aktuelleFrageIndex].bild;
                img.alt = fragenDaten[aktuelleFrageIndex].name;
                div.appendChild(img);
                imageRoller.appendChild(div);
            }

            // --- Bilder-Roll-Effekt starten ---
            let currentImageScroll = 0;
            let imageRollSpeed = 70; // Startgeschwindigkeit (Pixel pro Interval)
            
            // Berechnung der exakten Stopp-Position, damit das gewünschte Bild zentriert ist
            // Wir wollen die vorletzte Kopie der finalen Frage zentrieren.
            const targetImageIndexInRoller = imageRoller.children.length - (numFinalCopies - 1) - Math.floor(personBildRoller.clientHeight / imageSize / 2);
            const stopImagePosition = targetImageIndexInRoller * imageSize;


            imageRollInterval = setInterval(() => {
                currentImageScroll += imageRollSpeed;
                imageRoller.style.transform = `translateY(-${currentImageScroll}px)`;

                // Verlangsamen, wenn das Ziel in Sichtweite kommt
                const remainingDistance = stopImagePosition - currentImageScroll;
                if (remainingDistance < 1000 && imageRollSpeed > 7) { // Startet Verlangsamung 1000px vor Ziel
                    imageRollSpeed = Math.max(7, imageRollSpeed * 0.9); // Reduziert die Geschwindigkeit
                }
                
                if (currentImageScroll >= stopImagePosition) {
                    clearInterval(imageRollInterval); // Rollen stoppen
                    imageRoller.style.transform = `translateY(-${stopImagePosition}px)`; // Exakt positionieren

                    // --- Finale Person anzeigen ---
                    personBildRoller.classList.remove('active'); // Bilder-Roller ausblenden
                    finalPersonImage.src = fragenDaten[aktuelleFrageIndex].bild; // Bild setzen
                    finalPersonImage.alt = fragenDaten[aktuelleFrageIndex].name; // Alt-Text setzen
                    finalPersonName.textContent = fragenDaten[aktuelleFrageIndex].name; // Namen setzen
                    finalPersonDisplay.classList.add('active'); // Finale Anzeige einblenden

                    ziehenButton.disabled = false; // Button wieder aktivieren
                    ziehenButton.textContent = "Nächste Frage"; // Text ändern
                }
                // Notbremse: Falls der Roller zu weit scrollt (bei unerwarteten Größenänderungen)
                if (currentImageScroll > imageRoller.scrollHeight - imageSize / 2) { 
                    clearInterval(imageRollInterval);
                    // Den finalen Zustand herstellen
                    personBildRoller.classList.remove('active');
                    finalPersonImage.src = fragenDaten[aktuelleFrageIndex].bild;
                    finalPersonImage.alt = fragenDaten[aktuelleFrageIndex].name;
                    finalPersonName.textContent = fragenDaten[aktuelleFrageIndex].name;
                    finalPersonDisplay.classList.add('active');
                    ziehenButton.disabled = false;
                    ziehenButton.textContent = "Nächste Frage";
                }
            }, 50); // Alle 50ms aktualisieren (20 FPS)
        }

        // --- Funktion: Setzt alles auf den Ausgangszustand zurück ---
        function setzeZurueck() {
            clearTimeout(frageAnzeigeTimeout); // Alle laufenden Fragen-Timer stoppen
            frageAnzeige.classList.remove('active'); // Fragen-Anzeige deaktivieren
            frageAnzeige.textContent = ''; // Inhalt leeren

            personBildRoller.classList.remove('active'); // Personen-Roller deaktivieren
            if (imageRoller) imageRoller.innerHTML = ''; // Inhalt leeren (Prüfung auf Existenz, falls HTML noch nicht da ist)

            finalPersonDisplay.classList.remove('active'); // Finale Anzeige deaktivieren
            finalPersonImage.src = ''; // Bild leeren
            finalPersonName.textContent = ''; // Name leeren

            ziehenButton.disabled = false; // Button aktivieren
            ziehenButton.textContent = "Frage ziehen"; // Text auf Start setzen
            clearInterval(imageRollInterval); // Bild-Roller-Interval stoppen
        }
    </script>
</body>
</html>
